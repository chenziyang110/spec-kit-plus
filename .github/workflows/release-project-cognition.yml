name: Attach project-cognition binaries to release

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Cross-compile project-cognition
        working-directory: tools/project-cognition
        run: |
          mkdir -p bin
          VERSION="${{ github.event.release.tag_name }}"
          echo "Building project-cognition ${VERSION}..."

          TARGETS="
          linux/amd64
          linux/arm64
          darwin/amd64
          darwin/arm64
          windows/amd64
          "

          for target in $TARGETS; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            if [ "$goos" = "windows" ]; then ext=".exe"; fi

            echo "  -> ${goos}/${goarch}"
            GOOS=${goos} GOARCH=${goarch} CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags="-s -w -X 'main.version=${VERSION}'" \
                -o "bin/project-cognition-${goos}-${goarch}${ext}" .
          done

          echo ""
          echo "=== Built binaries ==="
          ls -lh bin/
          chmod +x bin/project-cognition-linux-amd64
          bin/project-cognition-linux-amd64 --help | grep -q "scan-prepare"
          bin/project-cognition-linux-amd64 --help | grep -q "scan-accept"
          bin/project-cognition-linux-amd64 scan-prepare --help 2>&1 | grep -q -- "-force"
          bin/project-cognition-linux-amd64 scan-accept --help 2>&1 | grep -q -- "-packet-id"

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v3
        with:
          files: tools/project-cognition/bin/*
