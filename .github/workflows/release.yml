name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, for example v0.5.1'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          if [[ ! "$VERSION" =~ ^v[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $VERSION"
            exit 1
          fi
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release for $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          expected_assets=(
            spec-lint-linux-amd64
            spec-lint-linux-arm64
            spec-lint-darwin-amd64
            spec-lint-darwin-arm64
            spec-lint-windows-amd64.exe
            project-cognition-linux-amd64
            project-cognition-linux-arm64
            project-cognition-darwin-amd64
            project-cognition-darwin-arm64
            project-cognition-windows-amd64.exe
          )
          if release_json="$(gh release view "$VERSION" --json isDraft,assets 2>/dev/null)" && \
             [ "$(jq -r '.isDraft' <<<"$release_json")" = "false" ]; then
            complete=true
            for asset in "${expected_assets[@]}"; do
              if ! jq -e --arg name "$asset" \
                '.assets[] | select(.name == $name and .size > 0)' \
                <<<"$release_json" >/dev/null; then
                complete=false
                break
              fi
            done
          else
            complete=false
          fi
          if [ "$complete" = "true" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $VERSION is published with every required asset; skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $VERSION is absent or incomplete; building and repairing it."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NO_V=${VERSION#v}

          # Find previous tag
          PREVIOUS_TAG=$(git tag -l 'v*' --sort=-version:refname | grep -v "^${VERSION}$" | head -n 1)
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=""
          fi

          # Get commits since previous tag
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMIT_COUNT=$(git rev-list --count HEAD)
            if [ "$COMMIT_COUNT" -gt 20 ]; then
              COMMITS=$(git log --oneline --pretty=format:"- %s" --no-merges HEAD~20..HEAD)
            else
              COMMITS=$(git log --oneline --pretty=format:"- %s" --no-merges)
            fi
          else
            COMMITS=$(git log --oneline --pretty=format:"- %s" --no-merges "$PREVIOUS_TAG"..HEAD)
          fi

          cat > release_notes.md << NOTES_EOF
          ## Install

          ### specify-cli

          \`\`\`bash
          uv tool install specify-cli --from git+https://github.com/chenziyang110/spec-kit-plus.git@${VERSION}
          specify init my-project
          \`\`\`

          ### spec-lint (spec quality checker)

          **Primary:** Use \`specify lint\` (auto-downloads on first run):
          \`\`\`bash
          specify lint -dir ./specs/001-xxx/ -tier standard
          \`\`\`

          **Standalone install:**
          \`\`\`bash
          # Linux / macOS
          curl -sSL https://raw.githubusercontent.com/chenziyang110/spec-kit-plus/main/tools/spec-lint/install.sh | bash
          # Windows (PowerShell)
          irm https://raw.githubusercontent.com/chenziyang110/spec-kit-plus/main/tools/spec-lint/install.ps1 | iex
          \`\`\`

          ### project-cognition runtime

          Generated project cognition workflows require the standalone \`project-cognition\` binary. This release publishes prebuilt binaries for Windows, Linux, and macOS. The runtime includes \`scan-set\`, context-budgeted \`scan-prepare\`, and resumable \`scan-lease\` / \`scan-checkpoint\` / \`scan-yield\` / \`scan-requeue\` / \`scan-status\` / \`scan-accept\` orchestration with receipt-bound scan validation. It also includes the default compass/expand navigation commands, the WorkContract v1 \`semantic-intake\` candidate command, the optional \`semantic-audit-resume\` validator for persisted semantic-audit state, the advanced lexicon/query planning commands, and \`closeout-plan\` for planner-first workflow-owned mutation closeout. Generated projects also include the semantic-audit-resume example matrix under \`.specify/templates/examples/semantic-audit-resume/\` so downstream workflows can validate fresh, route-changed, active-claim-changed, missing-file, claim-ref-mismatch, and verification-ref-mismatch resume outcomes.

          **Install the prebuilt release binary**
          \`\`\`bash
          # Linux / macOS
          curl -sSL https://raw.githubusercontent.com/chenziyang110/spec-kit-plus/main/tools/project-cognition/install.sh | PROJECT_COGNITION_VERSION=${VERSION} bash
          # Windows (PowerShell)
          \$env:PROJECT_COGNITION_VERSION="${VERSION}"; irm https://raw.githubusercontent.com/chenziyang110/spec-kit-plus/main/tools/project-cognition/install.ps1 | iex
          \`\`\`

          The generated helper scripts prefer \`PROJECT_COGNITION_BIN\` when it is set, then the pinned \`.specify/config.json\` \`project_cognition_launcher\`, and finally \`project-cognition\` from PATH.

          NOTES_EOF

          echo "## What's Changed" >> release_notes.md
          echo "" >> release_notes.md
          echo "$COMMITS" >> release_notes.md

      - uses: actions/setup-go@v6
        if: steps.check_release.outputs.exists == 'false'
        with:
          go-version: '1.21'

      - name: Cross-compile release tool binaries
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          SOURCE_REVISION="$(git rev-parse HEAD)"
          mkdir -p dist/release-tools

          TARGETS="
          linux/amd64
          linux/arm64
          darwin/amd64
          darwin/arm64
          windows/amd64
          "

          build_tool() {
            local tool="$1"
            local dir="$2"
            local ldflags="-s -w -X main.version=${VERSION}"
            if [ "$tool" = "project-cognition" ]; then
              ldflags="${ldflags} -X github.com/chenziyang110/spec-kit-plus/tools/project-cognition/internal/buildinfo.SourceRevision=${SOURCE_REVISION} -X github.com/chenziyang110/spec-kit-plus/tools/project-cognition/internal/buildinfo.BuildDirty=false"
            fi
            echo "Building ${tool} ${VERSION}..."
            for target in $TARGETS; do
              goos="${target%/*}"
              goarch="${target#*/}"
              ext=""
              if [ "$goos" = "windows" ]; then ext=".exe"; fi

              echo "  -> ${tool} ${goos}/${goarch}"
              (
                cd "$dir"
                GOOS=${goos} GOARCH=${goarch} CGO_ENABLED=0 \
                  go build -trimpath \
                    -ldflags="${ldflags}" \
                    -o "../../dist/release-tools/${tool}-${goos}-${goarch}${ext}" .
              )
            done
          }

          build_tool "spec-lint" "tools/spec-lint"
          build_tool "project-cognition" "tools/project-cognition"

          echo ""
          echo "=== Built release tool binaries ==="
          ls -lh dist/release-tools/

      - name: Smoke-test project-cognition release binary
        if: steps.check_release.outputs.exists == 'false'
        run: |
          chmod +x ./dist/release-tools/project-cognition-linux-amd64
          ./dist/release-tools/project-cognition-linux-amd64 --help | grep -q "scan-set"
          ./dist/release-tools/project-cognition-linux-amd64 --help | grep -q "scan-prepare"
          ./dist/release-tools/project-cognition-linux-amd64 --help | grep -q "scan-accept"
          ./dist/release-tools/project-cognition-linux-amd64 --help | grep -q "scan-checkpoint"
          ./dist/release-tools/project-cognition-linux-amd64 version --format json | grep -q '"runtime_protocol":"project-cognition.v2"'
          ./dist/release-tools/project-cognition-linux-amd64 version --format json | grep -q '"schema_version":5'
          ./dist/release-tools/project-cognition-linux-amd64 version --format json | grep -q '"dirty":false'
          ./dist/release-tools/project-cognition-linux-amd64 scan-prepare --help 2>&1 | grep -q -- "-force"
          ./dist/release-tools/project-cognition-linux-amd64 scan-prepare --help 2>&1 | grep -q -- "-safety-percent"
          ./dist/release-tools/project-cognition-linux-amd64 scan-lease --help 2>&1 | grep -q -- "-worker-capacity-tokens"
          ./dist/release-tools/project-cognition-linux-amd64 scan-accept --help 2>&1 | grep -q -- "-packet-id"
          ./dist/release-tools/project-cognition-linux-amd64 --help | grep -q "semantic-intake"
          ./dist/release-tools/project-cognition-linux-amd64 semantic-intake --help 2>&1 | grep -q -- "-input"
          ./dist/release-tools/project-cognition-linux-amd64 semantic-audit-resume --help 2>&1 | grep -q -- "-input"
          ./dist/release-tools/project-cognition-linux-amd64 compass --help 2>&1 | grep -q -- "-semantic-intake-file"
          ./dist/release-tools/project-cognition-linux-amd64 compass --help 2>&1 | grep -q -- "-query-plan-file"
          ./dist/release-tools/project-cognition-linux-amd64 expand --help 2>&1 | grep -q -- "-section"
          ./dist/release-tools/project-cognition-linux-amd64 delta append --help 2>&1 | grep -q -- "-verification"
          ./dist/release-tools/project-cognition-linux-amd64 delta append --help 2>&1 | grep -q -- "-generated-surface"
          ./dist/release-tools/project-cognition-linux-amd64 closeout-plan --help 2>&1 | grep -q -- "-workflow"
          ./dist/release-tools/project-cognition-linux-amd64 closeout-plan --help 2>&1 | grep -q -- "-delta-session"
          tmpdir="$(mktemp -d)"
          cp templates/examples/semantic-audit-resume/semantic-audit-input.json "$tmpdir/"
          cp templates/examples/semantic-audit-resume/semantic-audit-output.json "$tmpdir/"
          cp templates/examples/semantic-audit-resume/resume-validation.json "$tmpdir/"
          cp templates/examples/semantic-audit-resume/resume-validation-route-changed.json "$tmpdir/"
          ./dist/release-tools/project-cognition-linux-amd64 semantic-audit-resume --input "$tmpdir/resume-validation.json" --format json | grep -q '"semantic_audit_resume_status": "fresh"'
          ./dist/release-tools/project-cognition-linux-amd64 semantic-audit-resume --input "$tmpdir/resume-validation-route-changed.json" --format json | grep -q '"semantic_audit_resume_status": "needs-rerun"'

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NO_V=${VERSION#v}
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" \
              --title "Spec Kit Plus - $VERSION_NO_V" \
              --notes-file release_notes.md
          else
            gh release create "$VERSION" \
              --draft \
              --title "Spec Kit Plus - $VERSION_NO_V" \
              --notes-file release_notes.md
          fi

          gh release upload "$VERSION" dist/release-tools/* --clobber

          release_json="$(gh release view "$VERSION" --json assets)"
          missing=0
          for path in dist/release-tools/*; do
            asset="$(basename "$path")"
            if ! jq -e --arg name "$asset" \
              '.assets[] | select(.name == $name and .size > 0)' \
              <<<"$release_json" >/dev/null; then
              echo "Missing or empty release asset: $asset" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          gh release edit "$VERSION" --draft=false
          echo "Release $VERSION published with every required binary asset."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
