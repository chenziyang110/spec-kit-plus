name: Attach spec-lint binaries to release

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Cross-compile spec-lint
        working-directory: tools/spec-lint
        run: |
          mkdir -p bin
          VERSION="${{ github.event.release.tag_name }}"
          echo "Building spec-lint ${VERSION}..."

          TARGETS="
          linux/amd64
          linux/arm64
          darwin/amd64
          darwin/arm64
          windows/amd64
          "

          for target in $TARGETS; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            if [ "$goos" = "windows" ]; then ext=".exe"; fi

            echo "  -> ${goos}/${goarch}"
            GOOS=${goos} GOARCH=${goarch} CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags="-s -w -X 'main.version=${VERSION}'" \
                -o "bin/spec-lint-${goos}-${goarch}${ext}" .
          done

          echo ""
          echo "=== Built binaries ==="
          ls -lh bin/

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v3
        with:
          files: tools/spec-lint/bin/*
