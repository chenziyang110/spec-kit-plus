# AgentTeams Execution Engine Configuration

# How many workers to run in parallel
concurrency: 3

# Maximum number of times the verification loop can fail before aborting a task
max_fix_attempts: 3

# Sandbox configuration
sandbox:
  # Base directory for git worktrees and state ledgers
  # Relative to the project root
  worktree_dir: ".specify/agent-teams/worktrees"
  state_dir: ".specify/agent-teams/state"
  
  # Prefix for tmux sessions created by this extension
  tmux_prefix: "sp-team-"
